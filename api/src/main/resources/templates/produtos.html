<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <style>
        :root {
            --bg: #f7f4ef;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #7c3aed;
            --accent-soft: #ede9fe;
            --border: #e5e7eb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background:
                radial-gradient(circle at top left, rgba(124, 58, 237, 0.12), transparent 30%),
                linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
            color: var(--text);
        }
        .page { max-width: 1080px; margin: 0 auto; padding: 48px 24px 64px; }
        .hero { display: grid; gap: 12px; margin-bottom: 28px; }
        .eyebrow { text-transform: uppercase; letter-spacing: 0.18em; color: var(--accent); font: 600 12px/1.2 Arial, sans-serif; }
        h1 { margin: 0; font-size: clamp(2.2rem, 5vw, 4rem); line-height: 0.95; }
        .subtitle { margin: 0; color: var(--muted); max-width: 60ch; font: 400 1rem/1.6 Arial, sans-serif; }
        .panel { background: rgba(255, 255, 255, 0.9); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08); backdrop-filter: blur(10px); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 20px 24px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, #fff 0%, #f9fafb 100%); }
        .badge { display: inline-flex; align-items: center; gap: 8px; border-radius: 999px; padding: 8px 12px; background: var(--accent-soft); color: var(--accent); font: 700 13px/1 Arial, sans-serif; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 640px; }
        th, td { padding: 18px 24px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
        th { font: 700 13px/1.2 Arial, sans-serif; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); background: #fcfcfd; }
        tbody tr:hover { background: #fafafa; }
        .empty { padding: 40px 24px; color: var(--muted); font: 400 1rem/1.6 Arial, sans-serif; }
        .money { font-variant-numeric: tabular-nums; }
        .stock-on { color: #047857; font-weight: 700; }
        .stock-off { color: #b91c1c; font-weight: 700; }
        .nav-link { color: var(--accent); text-decoration: none; font: 700 13px/1 Arial, sans-serif; }
        @media (max-width: 720px) { .page { padding: 28px 16px 44px; } .panel-header { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero">
            <span class="eyebrow">Boazi Store</span>
            <h1>Produtos cadastrados</h1>
            <p class="subtitle">Lista dos produtos carregados do banco e renderizados pelo Thymeleaf.</p>
        </section>

        <section class="panel">
            <div class="panel-header">
                <div class="badge">Lista de produtos</div>
                <a class="nav-link" th:href="@{/}">Voltar para a home</a>
            </div>

            <div class="table-wrap" th:if="${!#lists.isEmpty(produtos)}">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="produto : ${produtos}">
                            <td th:text="${produto.id}">1</td>
                            <td th:text="${produto.nome}">Produto</td>
                            <td class="money" th:text="${produto.preco}">0.00</td>
                            <td>
                                <span th:if="${produto.estoque}" class="stock-on">Disponível</span>
                                <span th:unless="${produto.estoque}" class="stock-off">Indisponível</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty" th:if="${#lists.isEmpty(produtos)}">
                Nenhum produto encontrado no banco de dados.
            </div>
        </section>
    </main>
</body>
</html>
